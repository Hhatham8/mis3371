<!DOCTYPE html>
<html lang="en"> 
<!-- uses English as its language -->

<head>
    <!--
    Program name: patient-form.html
    Author: Hassan Hatham
    Date created: 2026-02-14
    Date last edited: 2026-02-14

    Description: A patient registration form for MediCare Plus capturing demographic and medical data.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare Plus - Patient Registration</title>
    
    <!-- External CSS Link -->
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <div class="container">
        
        <!-- Header Section -->
        <div class="header-div">
            <div class="logo-container">
                <!-- Reference to the local logo file -->
                <img src="logo.png" alt="MediCare Plus Logo">
                <h1>MediCare Plus</h1>
            </div>
            <!-- Dynamic Date Section -->
            <div>
                Today is: <span id="date-display" class="date-display">...loading date...</span>
            </div>
        </div>

        <!-- Main Content Section -->
        <div>
            <h2>Patient Registration Form</h2>
            <p>Please fill out the form below to register as a new patient.</p>

            <form action="thankyou.html" method="get" id="registration-form">
            <table>
                    <!-- Personal Information -->
                 <tr>
                        <td><label for="fname">First Name <span class="required-mark">*</span></label></td>
                        <td>
                            <input type="text" id="fname" name="fname" maxlength="30" required
                                placeholder="Enter first name">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="minitial">Middle Initial</label></td>
                        <td>
                            <input type="text" id="minitial" name="minitial" maxlength="1" size="2">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="lname">Last Name <span class="required-mark">*</span></label></td>
                        <td>
                            <input type="text" id="lname" name="lname" maxlength="30" required
                                placeholder="Enter last name">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="dob">Date of Birth</label></td>
                        <td>
                            <input type="date" id="dob" name="dob">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="ssn">Social Security Number</label></td>
                        <td>
                            <!-- Password type used to obscure characters as requested -->
                            <input type="password" id="ssn" name="ssn" maxlength="11" placeholder="XXX-XX-XXXX">
                        </td>
                    </tr>

                    <!-- Address Information -->
                    <tr>
                        <td><label for="addr1">Address Line 1</label></td>
                        <td>
                            <input type="text" id="addr1" name="addr1" maxlength="30" placeholder="Street address">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="addr2">Address Line 2</label></td>
                        <td>
                            <input type="text" id="addr2" name="addr2" maxlength="30" placeholder="Apt, Suite, Unit">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="city">City</label></td>
                        <td>
                            <input type="text" id="city" name="city" maxlength="30">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="state">State</label></td>
                        <td>
                            <!-- Dropdown list for State -->
                            <select id="state" name="state">
                                <option value="">Select State</option>
                                <option value="AL">Alabama</option>
                                <option value="AK">Alaska</option>
                                <option value="AZ">Arizona</option>
                                <option value="AR">Arkansas</option>
                                <option value="CA">California</option>
                                        <option value="CO">Colorado</option>
                                <option value="CT">Connecticut</option>
                                <option value="DE">Delaware</option>
                                <option value="DC">District Of Columbia</option>
                                <option value="FL">Florida</option>
                                <option value="GA">Georgia</option>
                                <option value="HI">Hawaii</option>
                                <option value="ID">Idaho</option>
                                <option value="IL">Illinois</option>
                                <option value="IN">Indiana</option>
                                <option value="IA">Iowa</option>
                                <option value="KS">Kansas</option>
                                <option value="KY">Kentucky</option>
                                <option value="LA">Louisiana</option>
                                <option value="ME">Maine</option>
                                <option value="MD">Maryland</option>
                                <option value="MA">Massachusetts</option>
                                <option value="MI">Michigan</option>
                                <option value="MN">Minnesota</option>
                                <option value="MS">Mississippi</option>
                                <option value="MO">Missouri</option>
                                <option value="MT">Montana</option>
                                <option value="NE">Nebraska</option>
                                <option value="NV">Nevada</option>
                                <option value="NH">New Hampshire</option>
                                <option value="NJ">New Jersey</option>
                                <option value="NM">New Mexico</option>
                                <option value="NY">New York</option>
                                <option value="NC">North Carolina</option>
                                <option value="ND">North Dakota</option>
                                <option value="OH">Ohio</option>
                                <option value="OK">Oklahoma</option>
                                <option value="OR">Oregon</option>
                                <option value="PA">Pennsylvania</option>
                                <option value="RI">Rhode Island</option>
                                <option value="SC">South Carolina</option>
                                <option value="SD">South Dakota</option>
                                <option value="TN">Tennessee</option>
                                <option value="TX">Texas</option>
                                <option value="UT">Utah</option>
                                <option value="VT">Vermont</option>
                                <option value="VA">Virginia</option>
                                <option value="WA">Washington</option>
                                <option value="WV">West Virginia</option>
                                <option value="WI">Wisconsin</option>
                                <option value="WY">Wyoming</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="zip">Zip Code</label></td>
                        <td>
                            <input type="text" id="zip" name="zip" maxlength="10" placeholder="12345">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="email">Email Address</label></td>
                        <td>
                            <input type="email" id="email" name="email" placeholder="name@domain.com">
                        </td>
                    </tr>

                    <!-- Description Text Area -->
                    <tr>
                        <td><label for="symptoms">Describe Current Symptoms</label></td>
                        <td>
                            <textarea id="symptoms" name="symptoms" rows="3" cols="50"></textarea>
                        </td>
                    </tr>

                    <!-- Checkboxes -->
                    <tr>
                        <td><label>Medical History</label><br><small>(Check all that apply)</small></td>
                        <td>
                            <input type="checkbox" id="cond1" name="history" value="Chicken Pox">
                            <label for="cond1">Chicken Pox</label><br>

                            <input type="checkbox" id="cond2" name="history" value="Measles">
                            <label for="cond2">Measles</label><br>

                            <input type="checkbox" id="cond3" name="history" value="Covid-19">
                            <label for="cond3">Covid-19</label><br>

                            <input type="checkbox" id="cond4" name="history" value="Small Pox">
                            <label for="cond4">Small Pox</label><br>

                            <input type="checkbox" id="cond5" name="history" value="Tetanus">
                            <label for="cond5">Tetanus</label>
                        </td>
                    </tr>

                    <!-- Radio Buttons - Gender -->
                    <tr>
                        <td><label>Gender</label></td>
                        <td>
                            <input type="radio" id="male" name="gender" value="Male">
                            <label for="male">Male</label>

                            <input type="radio" id="female" name="gender" value="Female">
                            <label for="female">Female</label>

                            <input type="radio" id="other" name="gender" value="Other">
                            <label for="other">Other</label>
                        </td>
                    </tr>

                    <!-- Radio Buttons - Vaccinated -->
                    <tr>
                        <td><label>Have you been vaccinated?</label></td>
                        <td>
                            <input type="radio" id="vac_y" name="vaccinated" value="Yes">
                            <label for="vac_y">Yes</label>

                            <input type="radio" id="vac_n" name="vaccinated" value="No">
                            <label for="vac_n">No</label>
                        </td>
                    </tr>

                    <!-- Radio Buttons - Insurance -->
                    <tr>
                        <td><label>do you have insurance? </label></td>
                        <td>
                        <input type="radio" id="ins_y" name="insurance" value="Yes">
                         <label for="ins_y">Yes</label>

                            <input type="radio" id="ins_n" name="insurance" value="No">
                            <label for="ins_n">No</label>
                        </td>
                    </tr>

                    <!-- Slide Bar -->
                    <tr>
                        <td><label for="health_scale">Health Scale (1-10)</label><br><small>(10 = Feeling Good)</small>
                        </td>
                        <td>
                            1 <input type="range" id="health_scale" name="health_scale" min="1" max="10" value="5"
                                oninput="document.getElementById('health_val').innerText = this.value"> 10
                            <br>
                            Current Value: <span id="health_val" style="font-weight:bold; color:#0056b3;">5</span>
                        </td>
                    </tr>

                    <!-- User Account -->
                    <tr>
                        <td><label for="userid">Desired User ID</label></td>
                        <td>
                            <input type="text" id="userid" name="userid" maxlength="20">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="pwd">Password</label></td>
                        <td>
                            <input type="password" id="pwd" name="pwd">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="pwd_confirm">Re-enter Password</label></td>
                        <td>
                            <input type="password" id="pwd_confirm" name="pwd_confirm">
                        </td>
                    </tr>

                    <!-- Buttons -->
                    <tr>
                        <td colspan="2" style="text-align: center; padding-top: 20px;">
                            <input type="reset" value="CLEAR AND START OVER">
                            <input type="submit" value="Submit">
                        </td>
                    </tr>
                </table>
            </form>
        </div>

        <!-- Footer Section -->
        <div class="footer-div">
            <p>
                <strong>MediCare Plus</strong><br>
                PO BOX 18881<br>
                Sugar Land, TX 77496
            </p>
            <a href="https://www.facebook.com" target="_blank">Facebook</a> |
            <a href="https://www.twitter.com" target="_blank">Twitter</a><br>
            <a href="#" class="btn-contact">Contact Us</a>
        </div>

    </div>

    <!-- Inline JavaScript for Dynamic Date -->
    <script>
        // Function to format the date as "Day, Month DDth, YYYY"
        function getFormattedDate() {
            const date = new Date();
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            const dayName = days[date.getDay()];
            const monthName = months[date.getMonth()];
            const dayNum = date.getDate();
            const year = date.getFullYear();

            // Add ordinal suffix (st, nd, rd, th)
            let suffix = "th";
            if (dayNum % 10 === 1 && dayNum !== 11) suffix = "st";
            else if (dayNum % 10 === 2 && dayNum !== 12) suffix = "nd";
            else if (dayNum % 10 === 3 && dayNum !== 13) suffix = "rd";

            return `${dayName}, ${monthName} ${dayNum}${suffix}, ${year}`;
        }

        // Set the date in the banner
        document.getElementById('date-display').innerText = getFormattedDate();
    </script>

</body>

</html>
